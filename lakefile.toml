name = "SFL"
version = "0.1.0"
license = "Apache-2.0"
defaultTargets = ["LF"]

[leanOptions]
weak.verso.code.warnLineLength = 0 # 0 disables warnings; consider setting to 70

# [[require]]
# name = "mathlib"
# scope = "leanprover-community"
# rev = "v4.30.0"

[[require]]
name = "verso"
git = "https://github.com/leanprover/verso"
rev = "main"

[[lean_lib]]
name = "SFLMeta"

[[lean_lib]]
name = "LF"
# CGH: I'm disabling globs because we need a successful build for Verso,
# which is not the case for current `main`
# globs = ["LF.+"]

[[lean_exe]]
name = "lf_student"
root = "MainStudent"

[[lean_exe]]
name = "lf_solutions"
root = "MainSolutions"

[[lean_exe]]
name = "lf_terse"
root = "MainTerse"
