name = "SFL"
version = "0.1.0"
license = "Apache-2.0"
defaultTargets = ["sfl"]

[leanOptions]
weak.verso.code.warnLineLength = 0 # 0 disables warnings; consider setting to 70

# [[require]]
# name = "mathlib"
# scope = "leanprover-community"
# rev = "v4.30.0"

[[require]]
name = "verso"
git = "https://github.com/leanprover/verso"
rev = "v4.32.0"

[[require]]
name = "batteries"
git = "https://github.com/leanprover-community/batteries"
rev = "v4.32.0"

[[lean_lib]]
name = "SFLMeta"

[[lean_lib]]
name = "LF"
# CGH: I'm disabling globs because we need a successful build for Verso,
# which is not the case for current `main`
# globs = ["LF.+"]

[[lean_lib]]
name = "HL"

[[lean_lib]]
name = "TS"

[[lean_exe]]
name = "sfl"
root = "Targets"

# Temporary scaffolding: draft book + executable that emits solutions .lean for
# generated LF/<Ch>Verso.lean chapters not yet in the real book, so they can be
# diffed against the bare LF/<Ch>.lean sources.  See LFDraft.lean.
[[lean_lib]]
name = "LFDraft"

[[lean_exe]]
name = "sfl-draft"
root = "TargetsDraft"
