name = "SFL"
version = "0.1.0"
license = "Apache-2.0"
defaultTargets = ["sfl"]

[leanOptions]
weak.verso.code.warnLineLength = 0 # 0 disables warnings; consider setting to 70

# [[require]]
# name = "mathlib"
# scope = "leanprover-community"
# rev = "v4.30.0"

# Using nightly-testing (not main) because it contains the "migrate to module
# system" fix (commit 77c5da4) that silences the `@[expose] has no effect
# outside a module file` warning. This branch requires a Lean nightly; the
# matching toolchain is pinned in lean-toolchain. When this causes a future
# build failure (Verso bumped its required nightly), update lean-toolchain to
# match the nightly date in .lake/packages/verso/lean-toolchain, then re-run
# `lake update`. Once the fix lands on Verso's main branch, switch rev back
# to "main" and lean-toolchain back to the current stable RC.
[[require]]
name = "verso"
git = "https://github.com/leanprover/verso"
rev = "nightly-testing"

[[lean_lib]]
name = "SFLMeta"

[[lean_lib]]
name = "LF"
# List only the chapters that currently build cleanly. To add a chapter
# once it passes, append its module name to this list.
globs = ["LF", "LF.Basics", "LF.Induction", "LF.UsingLean", "LF.Lists", "LF.Poly",
        "LF.Tactics", "LF.Logic", "LF.IndProp"]

[[lean_lib]]
name = "HL"

[[lean_lib]]
name = "TS"

[[lean_exe]]
name = "sfl"
root = "Targets"
